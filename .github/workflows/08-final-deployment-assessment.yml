name: 8-Final Deployment Assessment

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

  prepare-output:
    runs-on: ubuntu-latest
    needs: verify
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create image tag
        id: tag
        run: |
          TAG=$(date +'%Y-%m-%d')-${{ github.run_id }}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Full image: ${{ secrets.DOCKERHUB_USERNAME }}/tiny-health-app:$TAG"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/tiny-health-app:${{ steps.tag.outputs.tag }}"
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "Pushed image: $IMAGE"

  deploy-to-runner:
    runs-on: ubuntu-latest
    needs: prepare-output
    steps:
      - name: Pull and run container
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/tiny-health-app:${{ needs.prepare-output.outputs.image_tag }}"
          echo "Deploying image: $IMAGE"
          docker pull $IMAGE
          docker stop tiny-health-app || true
          docker rm   tiny-health-app || true
          docker run -d \
            --name tiny-health-app \
            -p 8000:8000 \
            -e APP_VERSION=${{ needs.prepare-output.outputs.image_tag }} \
            -e DEPLOY_ENV=production \
            $IMAGE

      - name: Wait for container
        run: sleep 5

      - name: Validate /health
        run: curl -f http://localhost:8000/health

      - name: Validate /version
        run: curl -f http://localhost:8000/version

      - name: Validate /status
        run: curl -f http://localhost:8000/status